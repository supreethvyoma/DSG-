<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Google Tag Manager and Consent Mode v2 Setup (GDPR & DPDP Act 2023 Compliant) -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      // Fetch stored consent preferences or default to denied
      let consentSettings = { analytics: false, marketing: false };
      try {
        const storedConsent = localStorage.getItem("dsg-cookie-consent");
        if (storedConsent) {
          consentSettings = JSON.parse(storedConsent);
        }
      } catch (e) {}

      gtag('consent', 'default', {
        'analytics_storage': consentSettings.analytics ? 'granted' : 'denied',
        'ad_storage': consentSettings.marketing ? 'granted' : 'denied',
        'ad_user_data': consentSettings.marketing ? 'granted' : 'denied',
        'ad_personalization': consentSettings.marketing ? 'granted' : 'denied',
        'security_storage': 'granted' // Necessary cookies are always granted
      });
    </script>
    <!-- Google Tag Manager Container -->
    <script>
      (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
      new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
      j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
      'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
      })(window,document,'script','dataLayer','GTM-W3V5K29D');
    </script>
    <!-- End Google Tag Manager -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- Google Fonts — Inter (primary) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Google Fonts — Inter (primary) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Widescreen Hero Banner image preload for instant paint (LCP reduction) -->
    <script>
      (function() {
        const hash = window.location.hash;
        // In a HashRouter SPA, pathname is always "/" on all pages. 
        // We must only check the hash to identify the homepage.
        if (hash === "" || hash === "#" || hash === "#/") {
          const link = document.createElement("link");
          link.rel = "preload";
          link.as = "image";
          link.href = "/assets/main-hero.webp";
          link.fetchPriority = "high";
          document.head.appendChild(link);
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Sanskrit Guru</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
